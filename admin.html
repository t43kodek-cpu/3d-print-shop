<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Admin Panel</h1>
  <a href="index.html"><button>Back to Shop</button></a>
</header>

<div class="admin-form">
  <h2>Add Product</h2>
  <form id="adminForm">
    <label>Name:</label><br>
    <input type="text" id="name" required><br><br>
    <label>Description:</label><br>
    <textarea id="description" required></textarea><br><br>
    <label>Price:</label><br>
    <input type="number" id="price" required><br><br>
    <label>Upload Image:</label><br>
    <input type="file" id="imageFile" accept="image/*"><br><br>
    <img id="preview" src="" alt="Preview" style="max-width:200px;margin-bottom:10px;"><br>
    <button type="submit">Add Product</button>
  </form>
</div>

<h2>Manage Products</h2>
<div id="adminProducts" class="grid"></div>

<script src="products.js"></script>
<script src="script.js"></script>
<script>
document.getElementById("imageFile").addEventListener("change", function(){
  handleImageUpload(this,"preview");
});

document.getElementById("adminForm").addEventListener("submit",function(e){
  e.preventDefault();
  const image = document.getElementById("preview").dataset.image;
  if(!image){ alert("Please upload an image"); return; }
  const newProduct = {
    id: products.length+1,
    name: document.getElementById("name").value,
    description: document.getElementById("description").value,
    price: parseFloat(document.getElementById("price").value),
    image: image,
    clicks: 0
  };
  products.push(newProduct);
  localStorage.setItem("products",JSON.stringify(products));
  alert(newProduct.name+" added!");
  this.reset();
  document.getElementById("preview").src="";
  renderAdminProducts();
  renderShopGrid();
});

renderAdminProducts();
</script>
</body>
</html>
